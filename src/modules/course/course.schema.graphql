# src/modules/course/course.schema.graphql
# CHANGED:
#   1. order: Int → String (fractional index)
#   2. Added category field to Course type
#   3. Added categoryId to CreateCourseInput and UpdateCourseInput
#   4. Added categoryId to CourseFiltersInput
#   5. Added sectionCount and lessonCount to Course type
#   6. Added CourseCategory sub-type

type CourseCategory {
  id: ID!
  name: String
}

type Course {
  id: ID!
  name: String!
  slug: String!
  order: String!
  category: CourseCategory
  isPublished: Boolean!
  isDeleted: Boolean!
  sectionCount: Int!
  lessonCount: Int!
  createdAt: String
  updatedAt: String
}

# --- Inputs ---

input CreateCourseInput {
  name: String!
  slug: String!
  categoryId: ID
  order: String
  isPublished: Boolean
}

input UpdateCourseInput {
  name: String
  slug: String
  categoryId: ID
  order: String
  isPublished: Boolean
}

input CourseFiltersInput {
  categoryId: ID
  isPublished: Boolean
  isDeleted: Boolean
}

# --- Pagination ---

type CourseEdge {
  cursor: String!
  node: Course!
}

type CourseConnection {
  edges: [CourseEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# --- Queries ---

type Query {
  course(id: ID, slug: String): Course
  courses(
    filters: CourseFiltersInput
    first: Int
    after: String
  ): CourseConnection!
}

# --- Mutations ---

type Mutation {
  createCourse(input: CreateCourseInput!): Course!
  updateCourse(id: ID!, input: UpdateCourseInput!): Course!
  deleteCourse(id: ID!): DeleteCoursePayload!
  restoreCourse(id: ID!): Course!
}

type DeleteCoursePayload {
  success: Boolean!
  message: String!
  id: ID!
}
