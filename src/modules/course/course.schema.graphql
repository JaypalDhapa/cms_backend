type Course {
  id: ID!
  name: String!
  slug: String!
  order: Int
  isPublished: Boolean!
  isDeleted: Boolean!
  createdAt: String
  updatedAt: String
}

# --- Inputs ---

input CreateCourseInput {
  name: String!
  slug: String!
  order: Int
  isPublished: Boolean
}

input UpdateCourseInput {
  name: String
  slug: String
  order: Int
  isPublished: Boolean
}

input CourseFiltersInput {
  isPublished: Boolean
  isDeleted: Boolean
}

# --- Pagination types (reused pattern from lessons) ---

type CourseEdge {
  cursor: String!
  node: Course!
}

type CourseConnection {
  edges: [CourseEdge!]
  pageInfo: PageInfo!
  totalCount: Int!
}

# --- Queries ---

type Query {
  course(id: ID, slug: String): Course
  courses(
    filters: CourseFiltersInput
    first: Int
    after: String
  ): CourseConnection!
}

# --- Mutations ---

type Mutation {
  createCourse(input: CreateCourseInput!): Course!
  updateCourse(id: ID!, input: UpdateCourseInput!): Course!
  deleteCourse(id: ID!): DeleteCoursePayload!
  restoreCourse(id: ID!): Course!
}

type DeleteCoursePayload {
  success: Boolean!
  message: String!
  id: ID!
}