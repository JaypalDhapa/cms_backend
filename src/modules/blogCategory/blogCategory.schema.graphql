scalar DateTime

type BlogCategory {
  id: ID!
  name: String!
  slug: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateCategoryInput {
  name: String!
  slug: String!
}

input UpdateCategoryInput {
  name: String
  slug: String
}

type Query {
  blogCategories: [BlogCategory!]!
  blogaCtegory(id: ID, slug: String): BlogCategory
}

type Mutation {
  createBlogCategory(input: CreateCategoryInput!): BlogCategory!
  updateBlogCategory(id: ID!, input: UpdateCategoryInput!): BlogCategory!
  deleteBlogCategory(id: ID!): Boolean!
}