scalar Date

# enums for lessontype

enum LessonType {
    single
    group
}

type LessonMeta {
    title:String!
    description:String!
    keywords:[String]!
}

type LessonCourse {
    id:ID!
    name:String
}

type Lesson{
    id:ID!
    title:String!
    slug:String!
    fullSlug:String!
    description:String
    course:LessonCourse!
    type:LessonType!
    parentId:ID
    order:Int!
    content:String!
    isPublished:Boolean!
    publishedAt:Date
    isDeleted:Boolean!
    meta:LessonMeta!
    createdAt:Date!
    updatedAt:Date!
}



# input Types

input LessonMetaInput {
    title:String!
    description:String!
    keywords:[String!]
}

input LessonCourseInput{
    id:ID!
    name:String
}



input CreateLessonInput{
    title:String!
    slug:String!
    fullSlug:String!
    description:String
    course:LessonCourseInput!
    type:LessonType
    parentId:ID
    order:Int
    content:String!
    isPublished:Boolean
    meta:LessonMetaInput!
}

input UpdateLessonInput {
    title:String
    slug:String
    fullSlug:String
    description:String
    type:LessonType
    parentId:ID
    order:Int
    content:String
    isPublished:Boolean
    meta:LessonMetaInput
}



# filter and pagination

input LessonFiltersInput {
    courseId:ID
    isPublished:Boolean
    isDeleted:Boolean
    parentId:ID
    type:LessonType
    
}


# cursor pagination Types

type PageInfo {
    hasNextPage:Boolean!
    hasPreviousPage:Boolean!
    startCursor:String
    endCursor:String
}

type LessonEdge{
    cursor:String!
    node:Lesson!
}

type LessonConnection {
    edges: [LessonEdge!]
    pageInfo:PageInfo!
    totalCount:Int!
}




type Query {
    lesson(id:ID,slug:String):Lesson

    lessons(
    filters:LessonFiltersInput
    first:Int
    after:String
    last:Int
    before:String
    ):LessonConnection!

    lessonSidebar(courseId:ID!):[Lesson!]! # no pagination - full tree
}


# Mutations

type Mutation {
    createLesson(input:CreateLessonInput):Lesson!
}